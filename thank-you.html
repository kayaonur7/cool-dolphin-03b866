<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>Northern Rock Technology Consulting LLC</span>
      </a>
      <nav class="nav-links">
        <a href="/services.html" data-i18n="nav_services">Services</a>
        <a href="/contact.html" data-i18n="nav_contact">Contact</a>
      </nav>
    </div>

  <main id="main-content" class="container">
    <section class="section">
      <div class="card" style="text-align:center; padding:40px;">
        <div style="font-size:42px; margin-bottom:10px;">✅</div>
        <h1 style="margin:0 0 10px;" data-i18n="thankyou_h1">Thank you!</h1>

  <div id="cookieBanner" class="cookie" role="dialog" aria-live="polite" aria-label="Cookie notice" hidden>
    <div class="cookie-inner">

        <strong data-i18n="cookie_title">Cookies</strong>

        <a class="cookie-link" href="/privacy.html" data-i18n="footer_privacy">Privacy</a>
      </div>
      <button id="cookieAccept" class="btn primary" type="button" data-i18n="cookie_ok">OK</button>
    </div>
  </div>
  <script>
    (function(){try{var key="nrt_cookie_ok";var banner=document.getElementById("cookieBanner");var btn=document.getElementById("cookieAccept");if(!banner||!btn)return;if(!localStorage.getItem(key)){banner.hidden=false;banner.classList.add("show");}btn.addEventListener("click",function(){localStorage.setItem(key,"1");banner.classList.remove("show");banner.hidden=true;});}catch(e){}})();
  </script>
